<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
  </head>
  <body>
    <form action="/auth/login" method="POST">
      <p><label for="user_name">Username: </label><input name="user_name" id="user_name" type="text" required></p>
      <p><label for="password">Password: </label><input name="password" id="password" type="password" autocomplete="current-password" required></p>
      <button type="submit">Login</button>
    </form>
    <a href="/auth/signup">Create account instead?</a>
  </body>
</html>
