{% extends "dashboard/base.html" %}

{# ── Shared admin sidebar — extend this instead of dashboard/base.html directly #}

{% block sidebar_nav %}
<a
    href="{{ url_for('admin.overview') }}"
    class="nav-link{% if request.endpoint == 'admin.overview' %} is-active{% endif %}"
    id="nav-admin-overview-link"
>
    <svg class="nav-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
    </svg>
    Overview
</a>

<div class="nav-section-label">Manage</div>

<a
    href="{{ url_for('admin.users') }}"
    class="nav-link{% if request.endpoint == 'admin.users' %} is-active{% endif %}"
    id="nav-admin-users-link"
>
    <svg class="nav-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
    </svg>
    Users
</a>

<a
    href="{{ url_for('admin.listings') }}"
    class="nav-link{% if request.endpoint == 'admin.listings' %} is-active{% endif %}"
    id="nav-admin-listings-link"
>
    <svg class="nav-link-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M20 7H4a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2z"/>
        <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
    </svg>
    Listings
</a>
{% endblock %}

{% block dashboard_extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/admin.css') }}">
{% endblock %}
